# Dokploy-ready compose file.
#
# ⚠ Bucket UI has NO built-in authentication. Before exposing a domain, add
# an auth layer: in Dokploy, attach a basicAuth middleware to the domain
# (Advanced → Traefik), or front the app with Authelia/authentik.
#
# Domain: add it in the Dokploy UI (service → Domains tab, container port 3000).
# Secrets: set ENCRYPTION_KEY (openssl rand -hex 32) and DATABASE_URL in the
# Dokploy Environment tab.
#
# Database: bring your own PostgreSQL — a Dokploy-managed database, or any
# reachable instance. Point DATABASE_URL at it; the container applies pending
# migrations on boot. (For local dev, see the README for a one-line
# `docker run postgres`.)
#
# Local usage without Dokploy:
#   ENCRYPTION_KEY=... DATABASE_URL=... docker compose up --build

services:
  bucket-ui:
    build: .
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
