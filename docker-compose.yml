# Dokploy-ready compose file.
#
# ⚠ Bucket UI has NO built-in authentication. Before exposing a domain, add
# an auth layer: in Dokploy, attach a basicAuth middleware to the domain
# (Advanced → Traefik), or front the app with Authelia/authentik.
#
# Domain: add it in the Dokploy UI (service → Domains tab, container port 3000).
# Secrets: set ENCRYPTION_KEY and POSTGRES_PASSWORD in the Dokploy Environment
# tab (ENCRYPTION_KEY = openssl rand -hex 32).
#
# Local usage without Dokploy:
#   POSTGRES_PASSWORD=... ENCRYPTION_KEY=... docker compose up --build

services:
  bucket-ui:
    build: .
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_URL: postgresql://bucket_ui:${POSTGRES_PASSWORD}@postgres:5432/bucket_ui
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bucket_ui
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bucket_ui
    volumes:
      - bucket-ui-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bucket_ui -d bucket_ui"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

volumes:
  bucket-ui-db:

networks:
  dokploy-network:
    external: true
