name: Docker

# Two image channels on GHCR (the repo's Packages tab), Dokploy-style with
# master standing in for their canary branch:
#
#   canary  — every push to master:        :canary + :sha-xxxxxxx
#   stable  — every v* tag (see release.yml): :latest + :1.2.3 / :1.2 / :1
#
# Note: a tag pushed by release.yml with the default GITHUB_TOKEN does NOT
# fire this `on: push` trigger (GitHub blocks workflow recursion) — that's
# why release.yml dispatches this workflow explicitly on the tag ref.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=canary,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # The Dokploy target runs amd64; add linux/arm64 here if you ever
          # deploy to ARM (roughly doubles the build time via QEMU).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Redeploy the Dokploy canary instance now that the fresh :canary image
      # is on GHCR. Only on master pushes — tag builds ship :latest, which the
      # canary instance doesn't track. Calling this on git-push instead (a
      # plain GitHub webhook) would race the build and redeploy the OLD image;
      # here the image is guaranteed pushed first. Set DOKPLOY_CANARY_WEBHOOK
      # to the compose deploy webhook (Dokploy → service → Deployments).
      - name: Trigger Dokploy canary redeploy
        if: github.ref == 'refs/heads/master'
        run: curl -fsS -X POST "${{ secrets.DOKPLOY_CANARY_WEBHOOK }}"
